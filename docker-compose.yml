services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-scheduforge_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-scheduforge}
      MYSQL_USER: ${MYSQL_USER:-scheduforge}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-scheduforge}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - scheduforge_mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  scheduforge_mysql_data:
